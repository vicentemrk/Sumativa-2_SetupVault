<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SetupVault - Gestor Táctico de Hardware</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <div class="min-h-screen flex flex-col">
        <header class="border-b border-white/5 sticky top-0 z-50 bg-slate-950/50 backdrop-blur-xl">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-xl font-semibold text-white tracking-tight">SetupVault</h1>
                            <p class="text-xs text-slate-400">Gestor de Hardware</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 header-actions">
                        <button id="btn-export" class="btn-secondary px-3 py-2 rounded-lg text-sm font-medium text-white/80 flex items-center gap-2 hover:text-white">
                            <i data-lucide="download" stroke-width="1.5" class="w-4 h-4"></i>
                            <span class="hidden sm:inline">Exportar</span>
                        </button>
                        <button id="btn-reset" class="btn-danger px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
                            <i data-lucide="trash-2" stroke-width="1.5" class="w-4 h-4"></i>
                            <span class="hidden sm:inline">Reset</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
            <section class="card rounded-xl p-6 sm:p-8 mb-8">
                <div class="mb-6">
                    <h2 class="text-lg font-semibold text-white tracking-tight">Nuevo Artículo</h2>
                    <p class="text-sm text-slate-400 mt-1">Añade items a tu presupuesto</p>
                </div>

                <form id="form-item" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label class="text-xs font-medium text-slate-300 uppercase tracking-wider mb-2 block">Nombre</label>
                        <input id="input-name" type="text" placeholder="Ej: RTX 4060" class="input-field w-full px-3 py-2.5 rounded-lg text-sm text-white placeholder-slate-500">
                        <p id="error-name" class="text-xs text-red-400 mt-1 hidden"></p>
                    </div>

                    <div>
                        <label class="text-xs font-medium text-slate-300 uppercase tracking-wider mb-2 block">Precio (CLP)</label>
                        <input id="input-price" type="number" placeholder="45000" class="input-field w-full px-3 py-2.5 rounded-lg text-sm text-white placeholder-slate-500">
                        <p id="error-price" class="text-xs text-red-400 mt-1 hidden"></p>
                    </div>

                    <div>
                        <label class="text-xs font-medium text-slate-300 uppercase tracking-wider mb-2 block">Prioridad</label>
                        <select id="input-priority" class="input-field w-full px-3 py-2.5 rounded-lg text-sm text-white bg-slate-900/50">
                            <option value="">Selecciona...</option>
                            <option value="Urgente">Urgente</option>
                            <option value="Planificada">Planificada</option>
                            <option value="Deseo">Deseo</option>
                        </select>
                        <p id="error-priority" class="text-xs text-red-400 mt-1 hidden"></p>
                    </div>

                    <div class="flex items-end">
                        <button type="submit" class="btn-primary w-full px-4 py-2.5 rounded-lg text-sm font-semibold text-white flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" stroke-width="1.5" class="w-4 h-4"></i>
                            Agregar
                        </button>
                    </div>
                </form>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="card rounded-xl p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Gasto Total</p>
                            <h3 id="total-amount" class="text-3xl font-bold text-white mt-2">$0</h3>
                        </div>
                        <div class="icon-wrapper">
                            <i data-lucide="wallet" stroke-width="1.5" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                    </div>
                    <div class="h-1 bg-white/5 rounded-full overflow-hidden">
                        <div id="budget-bar" class="h-full bg-gradient-to-r from-emerald-500 to-teal-400" style="width: 0%"></div>
                    </div>
                </div>

                <div class="card rounded-xl p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Presupuesto</p>
                            <h3 id="budget-text" class="text-3xl font-bold text-white mt-2">—</h3>
                        </div>
                        <div class="icon-wrapper">
                            <i data-lucide="target" stroke-width="1.5" class="w-5 h-5 text-emerald-400"></i>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input id="input-budget" type="number" placeholder="1000000" class="input-field flex-1 px-3 py-2 rounded-lg text-sm text-white placeholder-slate-500">
                        <button id="btn-save-budget" class="btn-secondary px-4 py-2 rounded-lg text-sm font-medium text-white">Guardar</button>
                    </div>
                </div>
            </section>

            <section>
                <div class="mb-6">
                    <h2 class="text-lg font-semibold text-white tracking-tight">Mi Inventario</h2>
                    <p class="text-sm text-slate-400 mt-1" id="items-count">0 artículos</p>
                </div>

                <div id="items-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

                <div id="empty-state" class="col-span-full flex flex-col items-center justify-center py-16 text-center">
                    <div class="mb-4 p-4 rounded-lg bg-white/5">
                        <i data-lucide="inbox" stroke-width="1.5" class="w-8 h-8 text-slate-500 mx-auto"></i>
                    </div>
                    <h3 class="text-sm font-medium text-white mb-1">Tu bóveda está vacía</h3>
                    <p class="text-sm text-slate-400">Comienza agregando tu primer artículo</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-reset" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay">
        <div class="card rounded-xl p-8 max-w-sm mx-4">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-red-500/15 rounded-lg">
                    <i data-lucide="alert-circle" stroke-width="1.5" class="w-5 h-5 text-red-400"></i>
                </div>
                <h3 class="text-lg font-semibold text-white">Borrar Todo</h3>
            </div>
            <p class="text-sm text-slate-400 mb-6">¿Estás seguro? Esta acción no se puede deshacer.</p>
            <div class="flex gap-3">
                <button id="btn-cancel-reset" class="btn-secondary flex-1 px-4 py-2 rounded-lg text-sm font-medium text-white">Cancelar</button>
                <button id="btn-confirm-reset" class="btn-danger flex-1 px-4 py-2 rounded-lg text-sm font-medium">Borrar</button>
            </div>
        </div>
    </div>
</body>
</html>
